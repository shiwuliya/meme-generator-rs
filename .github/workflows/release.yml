name: Build

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "meme_generator/**"
      - "meme_generator_cli/**"
      - "meme_generator_core/**"
      - "meme_generator_memes/**"
      - "meme_generator_py/**"
      - "meme_generator_server/**"
      - "meme_generator_utils/**"
      - "meme_options_derive/**"
    tags:
      - "v*"
  pull_request_target:
    paths:
      - "Cargo.toml"
      - "meme_generator/**"
      - "meme_generator_cli/**"
      - "meme_generator_core/**"
      - "meme_generator_memes/**"
      - "meme_generator_py/**"
      - "meme_generator_server/**"
      - "meme_generator_utils/**"
      - "meme_options_derive/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml


