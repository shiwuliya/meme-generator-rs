  #        with:
  #          command: upload
  #          args: --non-interactive --skip-existing meme-generator-wheels-*/*

  node_publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 下载 package 包
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: ./
          merge-multiple: true

      - name: 下载 构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: meme-generator-node-*
          path: artifacts

      - name: 测试
        run: |
          mv meme_generator_node/* .
          ls -R

      - name: 设置Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 构建
        run: |
          bun run napi create-npm-dirs
          bun run napi artifacts

      - name: 测试
        run: ls -R npm